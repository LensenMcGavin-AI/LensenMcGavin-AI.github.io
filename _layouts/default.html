<!DOCTYPE html>
<html>
  <head>
    <title>{% if page.title %}{{ page.title }} – {% endif %}{{ site.name }}</title>
    {% seo title=false %}
    {% include meta.html %}

    <link rel="stylesheet" type="text/css" href="{{ site.baseurl }}/assets/style.css" />
    <link rel="alternate" type="application/rss+xml" title="{{ site.name }}" href="{{ site.baseurl }}/feed.xml" />
    <link rel="canonical" href="{{ site.url }}{{ page.url }}" />

    <meta name="theme-color" content="#000000">
    <link rel="icon" type="image/png" sizes="32x32" href="{{ site.baseurl }}/images/favicon-32x32.png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css?family=Roboto&display=swap" rel="stylesheet">
    
    {% include analytics_head.html %}
  </head>

  <body>
    <div id="bar"></div>
    <div class="wrapper-container">
      <div class="wrapper-masthead">
        <div class="container">
          <header class="masthead clearfix">
            <a href="{{ site.baseurl }}/" class="site-avatar"><img src="{{ site.baseurl }}/images/lm-ai-logo-70w.webp" srcset="{{ site.baseurl }}/images/lm-ai-logo-70w.webp 70w, {{ site.baseurl }}/images/lm-ai-logo-140w.webp 140w, {{ site.baseurl }}/images/lm-ai-logo-280w.webp 280w" sizes="70px" alt="{{ site.title }}" width="70" height="70" decoding="async" /></a>

            <div class="site-info">
              <h1 class="site-name"><a href="{{ site.baseurl }}/">{{ site.name }}</a></h1>
              <!-- <p class="site-description">{{ site.description }}</p>  -->
            </div>

            <nav>
              <a href="{{ site.baseurl }}/">Home</a>
              <a href="{{ site.baseurl }}/about">About</a>
              <!-- <a href="{{ site.baseurl }}/contact">Contact</a> -->
              <a href="{{ site.baseurl }}/media">Media</a>
              <a href="{{ site.baseurl }}/cpd">Lawyer CPD</a>
            </nav>
          </header>
        </div>
      </div>

      <div class="wrapper-main">
        <div id="main" role="main" class="container">
          {{ content }}
        </div>
      </div>

      <div class="wrapper-footer">
        <div class="container">
          <footer class="footer">
            {% include svg-icons.html %}
          </footer>
        </div>
      </div>
    </div>

    <script>
      document.addEventListener('DOMContentLoaded', function() {
        const toggleLinks = document.querySelectorAll('.toggle-bio');
    
        toggleLinks.forEach(link => {
          link.addEventListener('click', function(e) {
            e.preventDefault();
            
            // 'bio' container is the parent <p>
            const bioParagraph = link.closest('.bio');
            
            // Find the .dots and .more spans
            const dots = bioParagraph.querySelector('.dots');
            const more = bioParagraph.querySelector('.more');
            
            // Toggle hidden class
            dots.classList.toggle('hidden');
            more.classList.toggle('hidden');
            
            // Update the link text
            link.textContent = more.classList.contains('hidden') ? 'Read more' : 'Read less';
          });
        });
      });
    </script>
    

    {% include analytics.html %}
  </body>
</html>
